<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Klassens Morgenmad</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #fff8f0;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container { max-width: 620px; margin: 0 auto; }

    .header { text-align: center; margin-bottom: 36px; }
    .header .emoji { font-size: 3rem; }
    .header h1 { font-size: 2rem; color: #b45309; margin: 8px 0 6px; }
    .header p  { color: #92400e; font-size: 1rem; }

    .status {
      display: inline-block;
      margin-top: 8px;
      font-size: 0.8rem;
      padding: 3px 12px;
      border-radius: 20px;
      background: #fde68a;
      color: #92400e;
    }
    .status.live { background: #dcfce7; color: #166534; }

    .progress-bar {
      background: #fde68a;
      border-radius: 20px;
      height: 12px;
      margin: 16px 0 6px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #f59e0b, #d97706);
      border-radius: 20px;
      transition: width 0.4s ease;
      width: 0%;
    }

    .progress-text {
      text-align: center;
      font-size: 0.85rem;
      color: #92400e;
      margin-bottom: 24px;
    }

    .checklist {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      overflow: hidden;
      border: 1px solid #fde68a;
    }

    .item {
      display: flex;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 1px solid #fef3c7;
      gap: 16px;
      transition: background 0.2s;
    }

    .item:last-child { border-bottom: none; }
    .item:hover { background: #fffbeb; }
    .item.checked { background: #f0fdf4; }
    .item.checked .item-label { text-decoration: line-through; color: #9ca3af; }

    .checkbox {
      width: 24px; height: 24px;
      border-radius: 6px;
      border: 2px solid #fbbf24;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      background: #fff;
      cursor: pointer;
    }

    .item.checked .checkbox { background: #22c55e; border-color: #22c55e; }
    .checkmark { display: none; color: #fff; font-size: 14px; font-weight: bold; }
    .item.checked .checkmark { display: block; }

    .item-emoji { font-size: 1.4rem; cursor: pointer; }

    .item-label {
      font-size: 1rem;
      color: #1f2937;
      font-weight: 500;
      flex: 1;
      cursor: pointer;
    }

    .name-input {
      border: none;
      border-bottom: 1px dashed #fbbf24;
      background: transparent;
      font-size: 0.85rem;
      color: #6b7280;
      width: 110px;
      text-align: right;
      outline: none;
      font-family: inherit;
    }

    .name-input::placeholder { color: #d1d5db; }

    .delete-btn {
      background: none;
      border: none;
      color: #fca5a5;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 0 4px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .item:hover .delete-btn { opacity: 1; }

    /* Add item form */
    .add-form {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      border: 1px solid #fde68a;
      padding: 20px;
      margin-top: 16px;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .add-form input[type="text"] {
      flex: 1;
      border: 1px solid #fde68a;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      background: #fffbeb;
      color: #1f2937;
    }

    .add-form input[type="text"]:focus { border-color: #f59e0b; }

    .emoji-input {
      width: 56px !important;
      flex: none !important;
      text-align: center;
      font-size: 1.2rem !important;
    }

    .add-btn {
      background: #f59e0b;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .add-btn:hover { background: #d97706; }

    .btn-reset {
      display: block;
      margin: 20px auto 0;
      background: #fbbf24;
      color: #78350f;
      border: none;
      padding: 10px 28px;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-reset:hover { background: #f59e0b; }

    .footer {
      text-align: center;
      margin-top: 20px;
      font-size: 0.85rem;
      color: #92400e;
    }
  </style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="emoji">🍳</div>
    <h1>Klassens Morgenmad</h1>
    <p>Mandag morgenmad — Skriv dig på nedenfor!</p>
    <div class="status" id="status">Forbinder...</div>
    <div class="progress-bar"><div class="progress-fill" id="fill"></div></div>
    <div class="progress-text" id="progress-text">0 valgt</div>
  </div>

  <div class="checklist" id="checklist"></div>

  <!-- Add item form -->
  <div class="add-form">
    <input type="text" class="emoji-input" id="new-emoji" placeholder="🍴" maxlength="2" />
    <input type="text" id="new-name" placeholder="Tilføj en ny vare..." />
    <button class="add-btn" onclick="addItem()">+ Tilføj</button>
  </div>

  <button class="btn-reset" onclick="resetAll()">Nulstil alt</button>

  <div class="footer">Klik på en vare for at markere den som taget &nbsp;|&nbsp; Skriv dit navn i feltet</div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, update, set, push, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBAdwm30ggf8K0gIgx9CkMvuayy6AiiCa4",
    authDomain: "breakfast-f7c80.firebaseapp.com",
    databaseURL: "https://breakfast-f7c80-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "breakfast-f7c80",
    storageBucket: "breakfast-f7c80.firebasestorage.app",
    messagingSenderId: "803322615237",
    appId: "1:803322615237:web:5c0345e647fa55a061e7ac"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);
  const itemsRef = ref(db, 'items');

  const defaults = [
    { emoji: "🥐", name: "Croissanter" },
    { emoji: "🍳", name: "Røræg" },
    { emoji: "🥓", name: "Bacon" },
    { emoji: "🍞", name: "Toast & Smør" },
    { emoji: "🥞", name: "Pandekager" },
    { emoji: "🍊", name: "Appelsinjuice" },
    { emoji: "🫐", name: "Frisk Frugtsalat" },
    { emoji: "🥛", name: "Mælk" },
    { emoji: "☕", name: "Kaffe / Te" },
    { emoji: "🍫", name: "Nutella" },
    { emoji: "🫙", name: "Syltetøj & Jordnøddesmør" },
    { emoji: "🧀", name: "Osteskiver" },
    { emoji: "🥨", name: "Bagels" },
    { emoji: "🍌", name: "Bananer" },
    { emoji: "🍩", name: "Donuts" },
    { emoji: "🧁", name: "Muffins" },
    { emoji: "🥤", name: "Smoothies" },
    { emoji: "🥣", name: "Cornflakes & Granola" },
    { emoji: "🍓", name: "Jordbær & Flødeskum" },
    { emoji: "🧇", name: "Vafler" },
  ];

  const list = document.getElementById('checklist');

  function renderItem(key, data) {
    const existing = document.getElementById('item-' + key);
    if (existing) {
      // Update existing
      if (data.checked) existing.classList.add('checked');
      else existing.classList.remove('checked');
      const nameInput = existing.querySelector('.name-input');
      if (document.activeElement !== nameInput) nameInput.value = data.name || '';
      return;
    }

    const div = document.createElement('div');
    div.className = 'item' + (data.checked ? ' checked' : '');
    div.id = 'item-' + key;

    div.innerHTML = `
      <div class="checkbox"><span class="checkmark">✓</span></div>
      <span class="item-emoji">${data.emoji || '🍴'}</span>
      <span class="item-label">${data.label}</span>
      <input class="name-input" placeholder="dit navn" value="${data.name || ''}" />
      <button class="delete-btn" title="Slet">✕</button>
    `;

    div.querySelector('.checkbox').addEventListener('click', () => {
      update(ref(db, `items/${key}`), { checked: !div.classList.contains('checked') });
    });

    div.querySelector('.item-label').addEventListener('click', () => {
      update(ref(db, `items/${key}`), { checked: !div.classList.contains('checked') });
    });

    div.querySelector('.name-input').addEventListener('input', (e) => {
      update(ref(db, `items/${key}`), { name: e.target.value });
    });

    div.querySelector('.delete-btn').addEventListener('click', () => {
      if (confirm(`Slet "${data.label}"?`)) remove(ref(db, `items/${key}`));
    });

    list.appendChild(div);
  }

  let initialized = false;

  onValue(itemsRef, (snapshot) => {
    const data = snapshot.val();

    if (!data) {
      // First load — seed with defaults
      const seed = {};
      defaults.forEach(d => { seed[push(itemsRef).key] = { emoji: d.emoji, label: d.name, checked: false, name: '' }; });
      set(itemsRef, seed);
      return;
    }

    if (!initialized) {
      list.innerHTML = '';
      initialized = true;
    }

    // Remove deleted items from DOM
    Array.from(list.children).forEach(child => {
      const key = child.id.replace('item-', '');
      if (!data[key]) child.remove();
    });

    // Render/update all items
    Object.entries(data).forEach(([key, val]) => renderItem(key, val));

    // Update progress
    const total   = Object.keys(data).length;
    const checked = Object.values(data).filter(v => v.checked).length;
    const pct = total ? (checked / total) * 100 : 0;
    document.getElementById('fill').style.width = pct + '%';
    document.getElementById('progress-text').textContent = `${checked} af ${total} valgt`;

    const statusEl = document.getElementById('status');
    statusEl.textContent = 'Live — ændringer synkroniseres øjeblikkeligt';
    statusEl.className = 'status live';
  });

  window.addItem = () => {
    const nameInput  = document.getElementById('new-name');
    const emojiInput = document.getElementById('new-emoji');
    const label = nameInput.value.trim();
    if (!label) { nameInput.focus(); return; }
    const emoji = emojiInput.value.trim() || '🍴';
    push(itemsRef, { emoji, label, checked: false, name: '' });
    nameInput.value  = '';
    emojiInput.value = '';
    nameInput.focus();
  };

  document.getElementById('new-name').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') window.addItem();
  });

  window.resetAll = () => {
    if (!confirm('Nulstil alle markeringer og navne?')) return;
    onValue(itemsRef, (snapshot) => {
      const data = snapshot.val() || {};
      const updates = {};
      Object.keys(data).forEach(k => { updates[k] = { ...data[k], checked: false, name: '' }; });
      set(itemsRef, updates);
    }, { onlyOnce: true });
  };
</script>
</body>
</html>
